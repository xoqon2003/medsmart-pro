services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medsmart-pg
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: medsmart_dev
      POSTGRES_USER: medsmart
      POSTGRES_PASSWORD: medsmart
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medsmart -d medsmart_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medsmart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg-data:
  redis-data:
